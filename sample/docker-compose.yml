version: "3.8"
services:
  web:
    image: nginx:1.25
    restart: always
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changeme
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data: {}
